name: build-and-release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # Matches the host runner registered with label "ubuntu-latest:host".
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Whisp.app
        run: bash scripts/build_app.sh "${{ github.sha }}"

      - name: Publish "latest" release
        env:
          # RELEASE_TOKEN (not FORGEJO_TOKEN) because Forgejo reserves the FORGEJO_ prefix.
          FORGEJO_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          FORGEJO_HOST: git.retardhub.com
          REPO_OWNER: ahtavarasmus
          REPO_NAME: whisp
          SHA: ${{ github.sha }}
        run: bash scripts/publish_release.sh
